// ---- SORT MASA KEYS ASC ----
function sortData(data) {
  return Object.keys(data)
    .sort((a, b) => {
      const na = parseInt(a.replace(/\D/g, ""));
      const nb = parseInt(b.replace(/\D/g, ""));
      return na - nb;
    })
    .reduce((acc, key) => {
      acc[key] = data[key];
      return acc;
    }, {});
}

const DATA_SORTED = sortData(DATA);

function render(filter = "") {
  const list = document.getElementById("list");
  list.innerHTML = "";

  Object.entries(DATA_SORTED).forEach(([masa, items]) => {
    const m = masa.toLowerCase();
    const f = filter.toLowerCase();

    const matchMasa = m.includes(f);
    const filteredItems = items.filter(i => i.toLowerCase().includes(f));

    if (!matchMasa && filteredItems.length === 0) return;

    const card = document.createElement("div");
    card.className = "card";

    const title = document.createElement("div");
    title.className = "masa-title";
    title.textContent = masa;

    card.appendChild(title);

    const showItems = matchMasa ? items : filteredItems;

    showItems.forEach(i => {
      const div = document.createElement("div");
      div.className = "item";
      div.textContent = i;
      card.appendChild(div);
    });

    list.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input", (e) => {
  render(e.target.value);
});

render();
